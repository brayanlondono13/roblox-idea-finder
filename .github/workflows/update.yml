name: Refresh Roblox dashboard

# Re-harvest live Roblox data daily and rebuild the public dashboard.
# Runs on a schedule + on-demand (Actions tab -> Run workflow).
on:
  schedule:
    - cron: '17 9 * * *'      # ~09:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write              # allow the action to commit the refreshed site

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Harvest fresh data + rebuild dashboard
        run: |
          python roblox_research.py --sleep 0.6 harvest --pages 1 --out data/corpus.json
          python roblox_research.py combos --corpus data/corpus.json --json data/combos.json
          python roblox_viz.py --corpus data/corpus.json --out docs/index.html

      - name: Commit refreshed site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/corpus.json data/combos.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily Roblox data refresh [skip ci]"
            git push
          fi
